name: Frontend CI/CD

on:
  push:
    branches: ["main"]

jobs:
  test_build:
    runs-on: [self-hosted, frontend]
    steps:
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Pull frontend repo
        run: |
          set -e
          cd /home/auction-frontend
          git pull origin main

      - name: Run frontend tests
        run: |
          set -e
          cd /home/auction-frontend
          npm test

      - name: Build
        run: |
          set -e
          cd /home/auction-frontend
          npm run build

      - name: Deploy to nginx
        run: |
          set -e
          cd /home/auction-frontend
          TARGET_DIR=/etc/nginx/html/bid
          sudo mkdir -p "$TARGET_DIR"
          sudo rsync -a --delete dist/ "$TARGET_DIR"/
          sudo systemctl reload nginx

