name: Frontend CI/CD

on:
  push:
    branches: ["main"]

jobs:
  test_build:
    runs-on: ubuntu-latest
    env:
      VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install deps
        run: npm ci

      - name: Run frontend tests
        run: npm test

      - name: Build
        run: npm run build

      - name: Deploy to VPS (rsync)
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_SSH_USER: ${{ secrets.VPS_SSH_USER }}
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
          TMP_DIR: /tmp/auction-frontend-dist
          TARGET_DIR: /etc/nginx/html/bid
        run: |
          set -e
          mkdir -p ~/.ssh
          echo "$VPS_SSH_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H "$VPS_HOST" >> ~/.ssh/known_hosts

          # Prepare temp dir on server
          ssh "$VPS_SSH_USER@$VPS_HOST" "rm -rf '$TMP_DIR' && mkdir -p '$TMP_DIR'"

          # Upload build
          rsync -az --delete -e "ssh -i ~/.ssh/id_rsa -o StrictHostKeyChecking=no" dist/ "$VPS_SSH_USER@$VPS_HOST:$TMP_DIR/"

          # Move into nginx html directory + reload
          ssh "$VPS_SSH_USER@$VPS_HOST" "sudo mkdir -p '$TARGET_DIR' && sudo rsync -a --delete '$TMP_DIR'/ '$TARGET_DIR'/ && sudo systemctl reload nginx"

