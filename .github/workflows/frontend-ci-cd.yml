name: Frontend CI/CD

on:
  push:
    branches: ["main"]

jobs:
  test_build:
    runs-on: [self-hosted, frontend]
    steps:
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Pull frontend repo
        run: |
          set -e
          cd /home/auction-frontend
          git pull origin main

      # After `git pull`, node_modules is still whatever was installed last time. If you
      # upgraded Vitest in package-lock (1.x vs 4.x), tests keep using the OLD vitest until
      # you reinstall — that causes Rolldown + "type ApiRequestOptions" parse failures.
      - name: Install dependencies (Linux Rolldown binding + npm install)
        run: |
          set -e
          cd /home/auction-frontend
          cp package.json package.json.bak
          cp package-lock.json package-lock.json.bak
          node - <<'NODE'
          const fs = require('fs')
          const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'))
          const winDep = pkg.devDependencies['@rolldown/binding-win32-x64-msvc']
          if (!winDep) throw new Error('Missing @rolldown/binding-win32-x64-msvc in devDependencies')
          delete pkg.devDependencies['@rolldown/binding-win32-x64-msvc']
          pkg.devDependencies['@rolldown/binding-linux-x64-gnu'] = winDep
          fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2))
          NODE
          rm -rf node_modules
          npm install
          mv package.json.bak package.json
          mv package-lock.json.bak package-lock.json

      - name: Run frontend tests
        run: |
          set -e
          cd /home/auction-frontend
          npm test

      - name: Build
        run: |
          set -e
          cd /home/auction-frontend
          npm run build

      - name: Deploy to nginx
        run: |
          set -e
          cd /home/auction-frontend
          TARGET_DIR=/etc/nginx/html/bid
          sudo mkdir -p "$TARGET_DIR"
          # Use cp (coreutils); many minimal CentOS images have no rsync installed.
          sudo rm -rf "$TARGET_DIR"/*
          sudo cp -a dist/. "$TARGET_DIR"/
          sudo systemctl reload nginx

